<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <div class="box"></div>
    <button id="btn1">Animate</button>
    <script src="jquery.min.js"></script>
    <script>
        $(".box").css({
            color: "white",
            backgroundColor: "blue",
            border: "2px solid black",
            height: "200px",
            width: "200px",
            margin: "25px",
            position: "absolute"
        })
        $("#btn1").click(function(){
            $(".box").animate({
                left:"250px",
                opacity:"0.4"
            },"slow")
        })
    </script>
</body>

</html>
