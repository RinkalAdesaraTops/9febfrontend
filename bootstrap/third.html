<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="bootstrap.min.css">
    <link href="https://getbootstrap.com/docs/5.3/assets/css/docs.css" rel="stylesheet">
    <style>
        .bd-example-zindex-levels>div {
            color: #fff;
            background-color: #712cf9;
            border: 1px solid #712cf9;
        }
    </style>
</head>

<body class="p-3 m-0 border-0 bd-example bd-example-zindex-levels position-relative">
    <div class="z-3 position-absolute p-5 rounded-3" style="top: 20px; left: 20px;">
        <span>z-3</span>
    </div>

    <div class="z-2 position-absolute p-5 rounded-3 bg-info" style="top: 40px; left: 40px;">
        <span>z-2</span>
    </div>

    <div class="z-1 position-absolute p-5 rounded-3 bg-warning" style="top: 60px; left: 60px;">
        <span>z-1</span>
    </div>

    <div class="z-0 position-absolute p-5 rounded-3 bg-danger" style="top: 80px; left: 80px;">
        <span>z-0</span>
    </div>

    <div class="z-n1 position-absolute p-5 rounded-3" style="top: 100px; left: 100px;">
        <span>z-n1</span>
    </div>
    <script src="bootstrap.bundle.min.js"></script>
</body>

</html>
