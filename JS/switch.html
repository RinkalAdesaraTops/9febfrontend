<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let a=parseInt(prompt("Enter a:"))
        let b=parseInt(prompt("Enter b:"))
        let ch=parseInt(prompt("1.Addition \n 2.Minus \n 3.Multiply\n4.Division \n 5.Exit \nEnter your choice:"))
        switch(ch){
            case 1: document.write('<br>Addition is '+(a+b))
                    break
            case 2: document.write('<br>MInus is '+(a-b))
                    break
            case 3: document.write('<br>Multiply is '+(a*b))
                    break
            case 4: document.write('<br>Division is '+(a/b))
                    break
            default: document.write('<br>Invalid choice..')
                    break
        }
    </script>
</body>
</html>
