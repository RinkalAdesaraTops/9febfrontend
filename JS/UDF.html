<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // User defined function
        // 1) TNRN - take nothing return nothing
        // function declaration & definition
        function add(){
            let a=20
            let b=10
            document.write('<br>Addition is '+(a+b))
        }
        // 2)TSRN - take something return nothing
        function area(r){
            const pi=3.14
            document.write('<br>Area of circle is '+(pi*r**2))
        }
        // 3)TNRS - take nothing return something
        function mult(){
            a=5
            b=7
            return a*b
        }
        // 4)TSRS
        function cube(a){
            return a**3
        }
        // function calling
        add()
        area(20)
        ans = mult()
        document.write('<br>Multiplication is '+ans)
        document.write('<br>Cube is '+cube(5))
        // document.write('<br>Multiplication is '+mult())
        // let a = parseFloat(prompt("Enter radius:"))
        // area(a)

    </script>
</body>
</html>
