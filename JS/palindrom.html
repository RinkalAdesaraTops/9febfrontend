<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // magic no =1729
        // sum of digits = 1+7+2+9=19
        // reverse =91
        //sum*rev = 19*91= 1729
        // factorial = 5! = 5*4*3*2*1=120
        // 121 = reverse no = 121
        let rev=0
        let no=126 //3 2 1 
        let n=no
        while(no>0){
            let r=no%10 //3*10=30+2=32 32*10=320+1=321
            no = Math.floor(no/10)
            rev=(rev*10)+r
        }
        document.write('<br>Reverse no is - '+rev)
        if(n==rev){
            document.write('<br>Palindrom no')
        } else {
            document.write('<br>Not Palindrom no')

        }
    </script>
</body>
</html>
