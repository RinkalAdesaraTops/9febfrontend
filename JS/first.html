<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        // Synchronous - step by step
        document.write("Hello")
        console.log("Hiii")
    </script>
</head>

<body>
    <div id="demo"></div>
    <div id="demo1"></div>
    <script>
        document.getElementById('demo').innerHTML = "<b>Hello123</b>"
        document.getElementById('demo1').innerText = "<b>Hello123</b>"
        // alert("Good Morning..!!")
    </script>
    <!-- Js - client side scripting language
    both - server(nodejs) & client(Reactjs) 
    -->
</body>

</html>
