<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let a=parseInt(prompt("Enter a:"))
        let b=parseInt(prompt("Enter b:"))
        let ch=prompt("+.Addition \n -.Minus \n *.Multiply\n /.Division \n 5.Exit \nEnter your choice:")
        switch(ch){
            case '+': document.write('<br>Addition is '+(a+b))
                    break
            case '-': document.write('<br>MInus is '+(a-b))
                    break
            case '*': document.write('<br>Multiply is '+(a*b))
                    break
            case '/': document.write('<br>Division is '+(a/b))
                    break
            default: document.write('<br>Invalid choice..')
                    break
        }
    </script>
</body>
</html>
