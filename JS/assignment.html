<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // shorthand +=,-=,*=,/=,%=,**=
        let a=10
        document.write('<br>A is '+a)
        a+=5 //a=a+5
        // relational = <,>,<=,>=,==,!=,===,!== 
        let str = "100"
        let s1 = 100
        // check only values
        document.write('<br>a == b '+(str==s1))
        document.write('<br>a == b '+(str!=s1))
        // check value & datatype both
        document.write('<br>a === b '+(str===s1))
        document.write('<br>a === b '+(str!==s1))
</script>
</body>
</html>
