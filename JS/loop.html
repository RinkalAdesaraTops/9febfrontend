<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // while,do_while & for loop
        let i=1
        while(i<=5){ //1<=5 entry controlled loop
            document.write('<br>'+i) //1
            i++
        }
        document.write('<br><hr>')
        let j=10
        do {
            document.write('<br>'+j)
            j++
        } while(j<=15) //exit controlled loop
        document.write('<br><hr>')
        for(let i=10;i<=20;i+=2){ //i=i+2 //entry controlled loop
            document.write('<br>'+i)
        }
    </script>
</body>
</html>
